}
function delCourse(id){
var c=C.find(function(x){return x.id===id});
if(c&&confirm("Delete course: "+c.ti+"?\n\nThis will also remove all attendance records.")){
C=C.filter(function(x){return x.id!==id});
cloudPost({action:"deleteCourse",id:id,type:"sales"});
save();render()
}
}

// NEW PRODUCT MODULE CRUD

modal('<h2>Add New Product Training Module</h2><div class="fg"><label>Module # (auto: P'+nextId+')</label><input id="np-id" value="'+nextId+'" readonly style="background:#edf1f5"/></div><div class="fg"><label>Module Title</label><input id="np-ti" placeholder="e.g. Advanced Reporting Features"/></div><div class="fg"><label>Description</label><textarea id="np-de" style="min-height:60px;resize:vertical;width:100%;padding:8px 12px;border:1px solid #c5ced6;border-radius:8px;font-size:12px;font-family:inherit" placeholder="What this module covers..."></textarea></div><div class="fr3"><div class="fg"><label>Scheduled Day</label><input id="np-dy" placeholder="e.g. Day 8"/></div><div class="fg"><label>Delivered By</label><input id="np-fc" value="SE"/></div><div class="fg"><label>SharePoint Link</label><input id="np-lk" placeholder="https://..."/></div></div><div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svNewProduct()">Save</button><button class="bt bo" onclick="clM()">Cancel</button></div>')
}
function svNewProduct(){
var id=parseInt(document.getElementById("np-id").value);
var ti=document.getElementById("np-ti").value.trim();
var de=document.getElementById("np-de").value.trim();
var dy=document.getElementById("np-dy").value.trim();
var fc=document.getElementById("np-fc").value.trim();
var lk=document.getElementById("np-lk").value.trim();
if(!ti){alert("Enter module title.");return}
P.push({id:id,ti:ti,de:de||"",dy:dy||"",fc:fc||"SE",lk:lk||"",at:[]});

save();clM();render()
}

// ASSIGN REP TO COURSE (from Roster)
function assignCourse(){
var names=E.map(function(x){return x.n}).sort();
var h='<h2>Assign Rep to Course</h2>';
h+='<div class="fg"><label>Employee</label><select id="ac-name">';
names.forEach(function(n){h+='<option>'+n+'</option>'});
h+='</select></div>';
h+='<div class="fg"><label>Course Type</label><select id="ac-type" onchange="updateCourseList()"><option value="sales">Sales Enablement Module</option><option value="product">Product Training Module</option></select></div>';
h+='<div class="fg"><label>Course</label><select id="ac-course">';
C.forEach(function(c){h+='<option value="s-'+c.id+'">'+c.id+'. '+c.ti+'</option>'});
h+='</select></div>';
h+='<div class="fr"><div class="fg"><label>Date Completed</label><input id="ac-date" value="'+new Date().toLocaleDateString("en-US")+'"/></div><div class="fg"><label>Manager</label><input id="ac-mgr" placeholder="e.g. Avery Baccala"/></div></div>';
h+='<div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svAssign()">Save</button><button class="bt bo" onclick="clM()">Cancel</button></div>';
modal(h)
}
function assignCourseForRep(repName){
assignCourse();
setTimeout(function(){
var sel=document.getElementById("ac-name");
if(sel){for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===repName){sel.selectedIndex=i;break}}}
var emp=E.find(function(x){return x.n===repName});
if(emp&&emp.mg){document.getElementById("ac-mgr").value=emp.mg}
},50)
}
function updateCourseList(){
var type=document.getElementById("ac-type").value;
var sel=document.getElementById("ac-course");
var h="";
if(type==="sales"){C.forEach(function(c){h+='<option value="s-'+c.id+'">'+c.id+'. '+c.ti+'</option>'})}
else{P.forEach(function(c){h+='<option value="p-'+c.id+'">P'+c.id+'. '+c.ti+'</option>'})}
sel.innerHTML=h
}
function svAssign(){
var name=document.getElementById("ac-name").value;
var courseVal=document.getElementById("ac-course").value;
var date=document.getElementById("ac-date").value.trim();
var parts=courseVal.split("-");
var type=parts[0];
var cid=parseInt(parts[1]);
if(type==="s"){
var c=C.find(function(x){return x.id===cid});
if(c){
if(c.at.find(function(a){return a.n===name})){alert(name+" already completed this course.");return}
c.at.push({n:name,dt:date});
cloudPost({action:"addAttendance",courseId:cid,name:name,date:date});
}
}else{
var c=P.find(function(x){return x.id===cid});
if(c){
if(c.at.find(function(a){return a.n===name})){alert(name+" already completed this module.");return}
c.at.push({n:name,dt:date});
cloudPost({action:"addProductAtt",courseId:cid,name:name,date:date});
}
}
save();clM();render()
}
