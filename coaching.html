var h='<h2>Edit Rep Profile</h2>';
h+='<div class="fg"><label>Name</label><input id="rn" value="'+r.n.replace(/"/g,"&quot;")+'"/></div>';
h+='<div class="fr3"><div class="fg"><label>Role</label><select id="rr"><option'+(r.r==="SDR"?" selected":"")+'>SDR</option><option'+(r.r==="AE"?" selected":"")+'>AE</option><option'+(r.r==="SE"?" selected":"")+'>SE</option></select></div>';
h+='<div class="fg"><label>Manager</label><input id="rm" value="'+(r.mg||"")+'"/></div>';
h+='<div class="fg"><label>Start Date</label><input id="rsd" value="'+(r.sd||"")+'"/></div></div>';
h+='<div class="fg"><label>Trend Label</label><input id="rtl" value="'+r.tl+'"/></div>';
h+='<div style="display:flex;gap:8px;margin-top:16px"><button class="bt bg" onclick="svRep('+id+')">Save</button><button class="bt bo" onclick="clMo()">Cancel</button></div>';
modal(h)}
function svRep(id){
var r=R.find(function(x){return x.id===id});if(!r)return;
var oldName=r.n;
r.n=document.getElementById("rn").value.trim();
r.r=document.getElementById("rr").value;
r.mg=document.getElementById("rm").value.trim();
r.tl=document.getElementById("rtl").value.trim();
// Update coaching log if name changed
if(oldName!==r.n){CL.forEach(function(c){if(c.rep===oldName)c.rep=r.n})}
try{localStorage.setItem("mv_reps",JSON.stringify(R))}catch(x){}
clSave();clMo();render()}
function loadReps(){try{var a=localStorage.getItem("mv_reps");if(a){var saved=JSON.parse(a);saved.forEach(function(s){var r=R.find(function(x){return x.id===s.id});if(r){r.n=s.n;r.r=s.r;r.mg=s.mg;r.tl=s.tl}})}}catch(x){}}

// ===== MAIN RENDER =====
function render(){rTabs();var m=document.getElementById("main");
var q=document.getElementById("search").value.trim().toLowerCase();
if(q.length>=2){
var matches=R.filter(function(r){
var nameMatch=r.n.toLowerCase().indexOf(q)>=0;
var mgrMatch=(r.mg||"").toLowerCase().indexOf(q)>=0;
var roleMatch=r.r.toLowerCase().indexOf(q)>=0;
return nameMatch||mgrMatch||roleMatch;
});
if(matches.length>0&&matches.length<=12){
var searchType="profiles for";
if(matches.every(function(r){return r.n.toLowerCase().indexOf(q)<0}))searchType="reps matching";
var h='<div style="font-size:13px;color:#6b7a88;margin-bottom:16px">Showing '+matches.length+' result'+(matches.length>1?"s":"")+' for "'+q+'" <span style="cursor:pointer;color:#1a6b54;font-weight:600;margin-left:8px" onclick="document.getElementById(\'search\').value=\'\';render()">✕ Clear search</span></div>';
matches.forEach(function(r){h+=rProfile(r)});
m.innerHTML=h;return;
}
if(matches.length===0){
m.innerHTML='<div class="emp">No reps found matching "'+q+'". <span style="cursor:pointer;color:#1a6b54;font-weight:600" onclick="document.getElementById(\'search\').value=\'\';render()">✕ Clear</span></div>';
return;
}
}
if(T==="Overview")m.innerHTML=rOverview();
else if(T==="Call Coaching")m.innerHTML=rCoach();
else if(T==="Skills & Gaps")m.innerHTML=rSkills();
else if(T==="Trends")m.innerHTML=rTrends();
else if(T==="Objections")m.innerHTML=rObj();
else if(T==="Pricing")m.innerHTML=rPrice();
else if(T==="Activity")m.innerHTML=rAct();
else if(T==="Coaching Plans")m.innerHTML=rPlans();
else if(T==="1:1 Log")m.innerHTML=rLog();
else if(T==="Rep Roster")m.innerHTML=rRoster()}

// SEARCH - wire up input event
var searchEl=document.getElementById("search");
searchEl.addEventListener("input",function(){render()});
searchEl.addEventListener("keyup",function(){render()});

// Load local first for instant display, then sync from cloud
clLoad();loadReps();render();
// Then load from cloud and refresh
clLoadCloud(function(){render()});
</script>
</body>
</html>
